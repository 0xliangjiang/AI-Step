services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-step-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-ai_step}
      - AI_PROVIDER=${AI_PROVIDER:-minimax}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - NANRUN_API_KEY=${NANRUN_API_KEY:-}
      - FREE_DAYS=${FREE_DAYS:-3}
      - AD_REWARD_DAYS=${AD_REWARD_DAYS:-1}
      - AD_DAILY_LIMIT=${AD_DAILY_LIMIT:-3}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-ai-step-admin-secret-key-2024}
      - WX_APPID=${WX_APPID:-}
      - WX_SECRET=${WX_SECRET:-}
      - WX_MCH_ID=${WX_MCH_ID:-}
      - WX_API_KEY=${WX_API_KEY:-}
      - WX_API_V3_KEY=${WX_API_V3_KEY:-}
      - WX_NOTIFY_URL=${WX_NOTIFY_URL:-}
      - WX_CERT_PATH=${WX_CERT_PATH:-}
      - WX_KEY_PATH=${WX_KEY_PATH:-}
      - USE_PROXY=${USE_PROXY:-true}
      - PROXY_API_URL=${PROXY_API_URL:-}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
      - CAPTCHA_PENDING_EXPIRE=${CAPTCHA_PENDING_EXPIRE:-300}
      - APP_DEBUG=${APP_DEBUG:-false}
      - USE_PROXY_MODE=${USE_PROXY_MODE:-true}
    networks:
      - ai-step-network

  # 前端服务
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: ai-step-frontend
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - backend
    networks:
      - ai-step-network

networks:
  ai-step-network:
    driver: bridge
